<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="vg-top" d="M 18 60 A 42 42 0 0 1 102 60" fill="none" />
    <path id="vg-bot" d="M 22 64 A 38 38 0 0 0 98 64" fill="none" />
  </defs>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" fill="#1A9FDC" />
  <circle cx="60" cy="60" r="50" fill="#FFFFFF" />

  <!-- Top arc text: VERGLEICH.ORG -->
  <text font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="9.5" fill="#1A9FDC" letter-spacing="1.6">
    <textPath href="#vg-top" startOffset="50%" text-anchor="middle">VERGLEICH.ORG</textPath>
  </text>

  <!-- Bottom arc text: TESTSIEGER -->
  <text font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="8" fill="#1A9FDC" letter-spacing="2.2">
    <textPath href="#vg-bot" startOffset="50%" text-anchor="middle">TESTSIEGER</textPath>
  </text>

  <!-- Stars -->
  <g fill="#1A9FDC" transform="translate(60 44)">
    <g id="vg-star">
      <polygon points="0,-5 1.45,-1.55 5.2,-1.55 2.15,0.6 3.3,4.05 0,1.95 -3.3,4.05 -2.15,0.6 -5.2,-1.55 -1.45,-1.55" />
    </g>
    <use href="#vg-star" x="-22" />
    <use href="#vg-star" x="-11" />
    <use href="#vg-star" x="11" />
    <use href="#vg-star" x="22" />
  </g>

  <!-- Rating label -->
  <text x="60" y="68" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="14" fill="#1A171B" letter-spacing="0.5">SEHR GUT</text>

  <!-- Score -->
  <text x="60" y="86" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="13" fill="#1A9FDC">1,4</text>
</svg>
